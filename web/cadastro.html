<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - LEPES</title>
<style>
body {
margin: 0;
padding: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #1c1c1c, #2a2a2a);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
color: #fff;
}


.card {
background: rgba(0, 0, 0, 0.6);
padding: 40px;
border-radius: 20px;
width: 350px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
text-align: center;
}


h2 {
margin-bottom: 20px;
color: #32a893;
font-size: 28px;
}


.input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 8px;
font-size: 16px;
}


.btn {
width: 100%;
padding: 12px;
margin-top: 15px;
background-color: #32a893;
border: none;
color: #fff;
border-radius: 8px;
font-size: 18px;
cursor: pointer;
font-weight: bold;
transition: 0.3s;
}


.btn:hover {
background-color: #288574;
}


a.voltar {
display: inline-block;
margin-top: 15px;
color: #32a893;
text-decoration: none;
font-size: 14px;
}


a.voltar:hover {
text-decoration: underline;
}
</style>
</head>
<body>
<div class="card">
<h2>Criar Conta</h2>

<form action="cadastro.php" method="POST">
<input type="text" name="nome" class="input" placeholder="Nome" required>
<input type="email" name="email" class="input" placeholder="Email" required>
<input type="password" name="senha" class="input" placeholder="Senha" required>
<button type="submit" class="btn">Cadastrar</button>
</form>
<a href="login.html" class="voltar">Voltar para o login</a>
</div>
<script>
document.querySelector(".btn").addEventListener("click", function(e) {
   e.preventDefault();
   const nome = document.querySelector('input[name="nome"]').value;
    const email = document.querySelector('input[name="email"]').value;
    const senha = document.querySelector('input[name="senha"]').value;

    fetch("cadastro.php", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, email, senha }) 
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
           alert("Cadastro realizado com sucesso! Você será redirecionado para o login.");
            window.location.href = "login.html"; 
        } else {
           alert("Falha no Cadastro: " + data.mensagem);
      }
    })
    .catch(error => {
     alert("Ocorreu um erro técnico na comunicação.");
    });
});

</script>
</body>
</html>
