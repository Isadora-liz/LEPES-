<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Perfil do Usuário</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #777;
    color: white;
}

.perfil-box {
    width: 90%;
    margin: 30px auto 10px;
    background: white;
    height: 160px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    padding-left: 25px;
    color: black;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 25px;
    border: 4px solid #024369;
}

.usuario-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.usuario-info h2 {
    margin: 0;
    font-size: 26px;
    color: #333;
}

.usuario-info p {
    margin: 0;
    font-size: 15px;
    color: #444;
}

.editar-bot {
    margin-top: 10px;
    width: 120px;
    background: #1877f2;
    color: white;
    padding: 8px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
    font-size: 15px;
    text-decoration: none;
}

.editar-bot:hover {
    background: #000145;
}

.info-titulo {
    color: #000145;
    font-size: 26px;
    width: 78.5%;
    margin: 20px auto 0;
    padding-bottom: 0px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

.abas-container {
    width: 80%;
    margin: 0px auto 20px;
    display: flex;
    background: #555;
    padding: 6px;
    border-radius: 20px;
    gap: 10px;
}

.abas-container a {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 18px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    text-decoration: none;
}

.abas-container a:hover {
    background: #1877a2;
}

.abas-container a.active {
    background: #1877f2;
    color: white;
    font-weight: bold;
}

.botao-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 15px 0;
    font-size: 18px;
}

.botao-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 15px 0;
    font-size: 18px;
}

.botao-menu a {
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.botao-menu a:hover {
    color: #1877f2 !important; 
}

.botao-menu a.active {
    color: #1877f2 !important;
}

#icone-mapa {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 14px;
}

#icone-mapa::before {
    content: 'map'; 
    font-family: 'Material Icons';
    font-size: 25px;
    margin-bottom: 4px;
}

#icone-explorar {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #ffffff;
  font-family: Arial, sans-serif;
  font-size: 14px;
}

#icone-explorar::before {
  content: 'explore'; 
  font-family: 'Material Icons';
  font-size: 25px; 
  margin-bottom: 4px;
}

#icone-usuario {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 14px;
}

#icone-usuario::before {
  content: 'person'; 
  font-family: 'Material Icons';
  font-size: 25px; 
  margin-bottom: 4px;
}

.lugar-card {
    width: 100%;
    background: #444;
    padding: 15px;
    border-radius: 12px;
    margin: 10px 0;
    display: flex;
    gap: 15px;
    align-items: center;
    
}

.lugar-img {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    object-fit: cover;
}

.fav-bot {
    font-size: 28px;
    cursor: pointer;
    margin-left: auto;
}
</style>
</head>
<body>

<div class="perfil-box">
    <div class="avatar" data-key="avatar"></div>

    <div class="usuario-info">
        <h2 data-key="nome">Usuário LEPES</h2>
        <p>Email: <span data-key="email">email@exemplo.com</span></p>
        <a href="editarPerfil.html" class="editar-bot">Editar Perfil</a>
    </div>
</div>

<div class="botao-menu">
    <a href="explorar.html" class="" id="icone-explorar">Explorar</a>
    <a href="mapa.html" class="" id="icone-mapa">Mapa</a>
    <a href="perfil.html" id="icone-usuario" class="active">Perfil</a>
</div>

<script>
fetch('perfil.php')
.then(res => res.json())
.then(usuario => {
    if(!usuario.ok){
        console.error(usuario.erro);
        return;
    }

    localStorage.setItem('id_usuario', usuario.id_usuario);

    document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if(usuario[key] !== undefined){
        if(key === "avatar" && usuario[key]) {
            el.style.backgroundImage = `url(${usuario[key]})`;
            el.style.backgroundSize = 'cover';
            el.style.backgroundPosition = 'center';
            el.textContent = "";
        } else {
            el.textContent = usuario[key];
        }
    }
});

    const idUsuario = localStorage.getItem('id_usuario');
        ativarEventosFavorito();
    });


function ativarEventosFavorito() {
    document.querySelectorAll(".fav-bot").forEach(bot => {
        bot.addEventListener("click", () => {

            const idEspaco = bot.dataset.id;

            fetch("favoritar.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id_usuario: localStorage.id_usuario,
                    id_espaco: idEspaco
                })
            })
            .then(r => r.json())
            .then(res => {
                if (!res.favoritou) {
                    bot.closest(".lugar-card").remove();
                }
            });

        });
    });
}


function carregarAvaliados() {
    const idUsuario = localStorage.getItem('id_usuario');
    const container = document.getElementById("conteudo-abas");

    if (!idUsuario) {
        container.innerHTML = "<p>Faça login para ver suas avaliações.</p>";
        return;
    }

    fetch(`avaliados.php?id_usuario=${idUsuario}`)
        .then(res => res.text())
        .then(text => {
            let lista;
            try {
                lista = JSON.parse(text); 
            } catch (e) {
                console.error("Resposta do servidor não é JSON válido:", text);
                container.innerHTML = "<p>Erro ao carregar avaliações.</p>";
                return [];
            }
            return lista;
        })
        .then(lista => {
            if (!lista || lista.length === 0) {
                container.innerHTML = "<p>Nenhum item avaliado ainda.</p>";
                return;
            }

            container.innerHTML = ""; 

            lista.forEach(lugar => {
                const div = document.createElement('div');
                div.classList.add('lugar-card');

                div.innerHTML = `
                    <img src="${lugar.imagem}" class="lugar-img">
                    <div class="info">
                        <h3 class="titulo-local">${lugar.nome}</h3>
                        <p class="endereco">${lugar.endereco}</p>
                        <p>${lugar.descricao}</p>

                        <div class="estrelas" data-id="${lugar.id_espaco}" data-avaliacoes="${lugar.nota}">
                            ${[1,2,3,4,5].map(n => `
                                <span class="estrela" data-value="${n}" style="color:${n <= lugar.nota ? "#ff7b22" : "#ccc"}">★</span>
                            `).join('')}
                        </div>
                    </div>
                `;

                container.appendChild(div);

                const estrelasBlock = div.querySelector(".estrelas");
                const estrelas =estrelasBlock.querySelectorAll(".estrela");
                estrelas.forEach(estrela => {
                    estrela.addEventListener("click", () => {
                        const nota = estrela.dataset.value;
                        estrelas.forEach(s => s.style.color = (s.dataset.value <= nota) ? "#ff7b22" : "#ccc");
                        Avaliar(lugar.id_espaco, nota);
                    });
                });
            });
        })
        .catch(err => {
            console.error("Erro ao carregar avaliados:", err);
            container.innerHTML = "<p>Erro ao carregar avaliações.</p>";
        });
}

function carregarEventos(){
    document.getElementById("conteudo-abas").innerHTML = "<p>Nenhum evento curtido ainda.</p>";
}

</script>

</body>
</html>
