<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar Local Esportivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    padding:40px 20px;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
}

.topo{
    text-align:center;
    margin-top:20px;
    margin-bottom:35px;
}

.topo h1{
    font-size:42px;
    font-weight:700;
    margin-bottom:10px;
}

.topo p{
    color:#94a3b8;
    font-size:16px;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.card-header{
    padding:30px;
    border-bottom:1px solid #1f2937;
}

.card-header h2{
    margin-bottom:8px;
}

.card-header p{
    color:#94a3b8;
}

.form{
    padding:30px;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
}

.obrigatorio{
    color:#ef4444;
}

.modalidades-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.modalidades-grid input{
    display:none;
}

.modalidade-card{
    background:#1e293b;
    border:2px solid #334155;
    border-radius:18px;
    height:70px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;

    cursor:pointer;
    transition:0.10s;
}

.modalidade-card:hover{
    transform:translateY(-3px);
    border-color:#3b82f6;
}

.modalidade-card span{
    font-size:10px;
    font-weight:200;
}

.modalidade-card{
    font-size:15px;
}

.modalidades-grid input:checked + .modalidade-card{
    background:rgba(37,99,235,0.15);
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.15);
}

.acessibilidade-container{
    background:#0f172a;
    border:1px solid #334155;
    border-radius:16px;
    padding:18px;
    margin-top:8px;
}

.acessibilidade-grid{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.acessibilidade-grid input{
    display:none;
}

.acessibilidade-card{
    background:#1e293b;
    border:2px solid #334155;
    color:#cbd5e1;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
    transition:.25s;
    user-select:none;
}

.acessibilidade-card:hover{
    border-color:#3b82f6;
}

.acessibilidade-grid input:checked + .acessibilidade-card{
    background:#2563eb;
    border-color:#60a5fa;
    color:white;
}

.modalidades-container{
    background:#0f172a;
    border:1px solid #334155;
    border-radius:16px;
    padding:18px;
    margin-top:8px;
}

input[type="text"],
textarea,
select{
    width:100%;
    background:#1e293b;
    border:1px solid #334155;
    border-radius:14px;
    padding:15px;
    color:white;
    font-size:15px;
    transition:.3s;
}

input[type="text"]::placeholder,
textarea::placeholder{
    color:#64748b;
}

input[type="text"]:focus,
textarea:focus,
select:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

textarea{
    resize:vertical;
    min-height:120px;
}

.modalidades{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.item{
    background:#1e293b;
    border:1px solid #334155;
    padding:12px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.item input{
    width:18px;
    height:18px;
}

.upload{
    border:2px dashed #334155;
    border-radius:16px;
    padding:35px;
    text-align:center;
    background:#1e293b;
    cursor:pointer;
    transition:.3s;
}

.upload:hover{
    border-color:#3b82f6;
}

.upload p{
    color:#94a3b8;
    margin-top:8px;
}

.upload input{
    display:none;
}

.btn{
    width:100%;
    margin-top:10px;
    border:none;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    padding:16px;
    font-size:16px;
    font-weight:600;
    border-radius:14px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,.3);
}

</style>
</head>
<body>

<div class="container">

    <div class="topo">
        <h1>Adicionar espaço esportivo</h1>
    </div>

    <div class="card">

        <div class="card-header">
            <h2>Informações do Local</h2>
            <p>Preencha os dados abaixo. Campos marcados com asterisco (*) são obrigatórios.</p>
        </div>

        <form class="form">

            <div class="form-group">
                <label>Nome do local <span class="obrigatorio">*</span></label>
                <input type="text" placeholder="Ex: Ginásio Poliesportivo Municipal">
            </div>

            <div class="form-group">
                <label>Endereço completo <span class="obrigatorio">*</span></label>
                <input type="text" placeholder="Ex: Rua das Flores, 123 - Centro">
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea placeholder="Descreva as características do local esportivo..."></textarea>
            </div>

            <div class="form-group">
<div class="form-group">
    <label>Modalidades disponíveis <span class="obrigatorio">*</span></label>
    <div class="modalidades-grid">

        <input type="checkbox" id="futebol" name="modalidades[]">
        <label for="futebol" class="modalidade-card">
            Futebol
        </label>

        <input type="checkbox" id="volei" name="modalidades[]">
        <label for="volei" class="modalidade-card">
            Vôlei
        </label>

        <input type="checkbox" id="basquete" name="modalidades[]">
        <label for="basquete" class="modalidade-card">
            Basquete
        </label>

        <input type="checkbox" id="handebol" name="modalidades[]">
        <label for="handebol" class="modalidade-card">
            Handebol
        </label>

        <input type="checkbox" id="futsal" name="modalidades[]">
        <label for="futsal" class="modalidade-card">
            Futsal
        </label>

        <input type="checkbox" id="tenis" name="modalidades[]">
        <label for="tenis" class="modalidade-card">
            Tênis
        </label>

    </div>
</div>

          <div class="form-group">
    <label>
        Acessibilidade
        <span class="obrigatorio">*</span>
    </label>

        <div class="acessibilidade-grid">

            <input type="checkbox" id="rampa" name="acessibilidade[]">
            <label for="rampa" class="acessibilidade-card">
                Rampa de Acesso
            </label>

            <input type="checkbox" id="banheiro" name="acessibilidade[]">
            <label for="banheiro" class="acessibilidade-card">
                Banheiro Adaptado
            </label>

            <input type="checkbox" id="piso" name="acessibilidade[]">
            <label for="piso" class="acessibilidade-card">
                Piso Tátil
            </label>

            <input type="checkbox" id="elevador" name="acessibilidade[]">
            <label for="elevador" class="acessibilidade-card">
                Elevador
            </label>

            <input type="checkbox" id="vagas" name="acessibilidade[]">
            <label for="vagas" class="acessibilidade-card">
                Vagas Reservadas
            </label>
<div class="modalidades-container">
    <div class="modalidades-grid">
    </div>
</div>
        </div>

    </div>
</div>

            <div class="form-group">
                <label>Imagens do local</label>

                <label class="upload">
                    📷
                    <h3>Selecionar Imagens</h3>
                    <p>Arraste arquivos ou clique para enviar</p>
                    <input type="file" multiple accept="image/*">
                </label>
            </div>

            <button class="btn">
                Cadastrar Local
            </button>

        </form>

    </div>

</div>

</body>
</html>
