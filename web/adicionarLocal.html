<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar Local - LEPES</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1c1c1c, #2a2a2a);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    background: rgba(0, 0, 0, 0.6);
    padding: 40px;
    border-radius: 20px;
    width: 920px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
}

h2 {
    font-family: tahoma;
    font-size: 28px;
    text-align: center;
    color: #32a893;
    margin-bottom: 25px;
}

.input,
.select,
.textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
}

.textarea {
    resize: vertical;
    min-height: 100px;
}

.checkbox-group p {
    flex-basis: 100%;
    font-size: 20px;
    font-weight: bold;
    color: #32a893;
    margin: 0 0 15px 0;
}

.checkbox-group label {
    display: block;
    margin: 6px 0;
    cursor: pointer;
}

.checkbox-group input[type="checkbox"] {
    margin-right: 8px;
}

.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 97%;
    margin: 20px 0;
    background-color: #0c0b0b;
    border-radius: 10px;
    padding: 15px;
}

.checkbox-item {
    cursor: pointer;
}

.checkbox-item input {
    display: none;
}

.checkbox-item span {
    font-size: 13px;
    display: block;
    padding: 10px 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 2px solid transparent;
    transition: all 0.1s;
}

.checkbox-item span:hover {
    background: rgba(255,255,255,0.15);
}

.checkbox-item input:checked + span {
    background: #32a893;
    color: white;
    border-color: #42d4b8;
    transform: scale(1.03);
}
.btn-upload {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    text-align: center;
    background-color: #32a893;
    border-radius: 8px;
    cursor: pointer;
    box-sizing: border-box;
}

.btn-upload:hover {
    background-color: #106e5d;
}

.btn{
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background-color: #32a893;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background-color: #175f52;
}

.lista-locais {
    margin-top: 30px;
}

.galeria {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    margin-top: 15px;
}

.foto-local {
    width: 180px;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
}
.local {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    border-left: 4px solid #32a893;
}

.local h3 {
    margin: 0 0 10px;
    color: #32a893;
}
.voltar {
    display: block;
    width: 80px;
    padding: 12px;
    margin: 15px auto 0;
    background-color: #254942;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    text-align: center;
    font-size: 16px;
    font-weight: bold;
}




</style>

</head>
<body>

<div class="card">

    <h2>Adicionar Local Esportivo</h2>

    <input type="text" id="nome" class="input" placeholder="Nome do local">

    <label class="btn-upload" for="foto">Selecionar Foto(s) do local</label>
    <input type="file" id="foto" style="display: none;" accept="image/*" multiple>
    <p id="msgFoto" style="display:none; color:#32a893; margin-top:10px;">
    ✓ Fotos selecionadas com sucesso!
    </p>

    <div class="checkbox-group">

    <p><strong>Modalidades disponíveis</strong></p>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Voleibol de quadra">
        <span>Voleibol de quadra</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Futebol de campo">
        <span>Futebol de campo</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Basquetebol">
        <span>Basquetebol</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Skate">
        <span>Skate</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Tênis de mesa">
        <span>Tênis de mesa</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Futsal">
        <span>Futsal</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Futebol de areia">
        <span>Futebol de areia</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Voleibol de praia">
        <span>Voleibol de praia</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Ginástica">
        <span>Ginástica</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Artes marciais">
        <span>Artes marciais</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Futevôlei">
        <span>Futevôlei</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Atletismo infantil">
        <span>Atletismo infantil</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" name="modalidade" value="Beach tennis">
        <span>Beach tennis</span>
    </label>

</div>

    <input type="text" id="endereco" class="input" placeholder="Endereço">
    <input type="text" id="acessibilidade" class="input" placeholder="Acessibilidade">
    <textarea id="descricao" class="textarea" placeholder="Descrição do local"></textarea>
    <button class="btn" onclick="adicionarLocal()">
        Adicionar Local
    </button>

    <div id="listaLocais" class="lista-locais"></div>

    <a href="index.html" class="voltar">Voltar</a>

</div>
<script>

document.getElementById("foto").addEventListener("change", function() {
    const msg = document.getElementById("msgFoto");

    if (this.files.length > 0) {
        msg.style.display = "block";
        msg.innerHTML = `✓ ${this.files.length} foto(s) selecionada(s) com sucesso!`;
    } else {
        msg.style.display = "none";
    }
});

function adicionarLocal() {
    const nome = document.getElementById("nome").value;
const esporte = Array.from(
    document.querySelectorAll('input[name="modalidade"]:checked')
).map(item => item.value);
    const endereco = document.getElementById("endereco").value;
    const descricao = document.getElementById("descricao").value;
    const lista = document.getElementById("listaLocais");
    const acessibilidade = document.getElementById("acessibilidade").value;
    const fotoInput = document.getElementById("foto");
    document.getElementById("msgFoto").style.display = "none";
    const fotos = Array.from(fotoInput.files || []);
    

    if (!nome || !esporte || !endereco || !descricao || !acessibilidade || fotos.length === 0) {
        alert("Preencha todos os campos obrigatórios e/ou selecione pelo menos uma foto.");
        return;
    }

    let imagensHTML = "";

for (let i = 0; i < fotos.length; i++) {
    imagensHTML += `
        <img
            src="${URL.createObjectURL(fotos[i])}"
            alt="${nome} ${i + 1}"
            class="foto-local">
    `;
}

    const local = document.createElement("div");
    local.classList.add("local");

    local.innerHTML = `
        <h3>${nome}</h3>
        <p><strong>Modalidades:</strong> ${esporte.join(", ")}</p>       
        <p><strong>Endereço:</strong> ${endereco}</p>
        <p><strong>Acessibilidade:</strong> ${acessibilidade}</p>
        <p>${descricao}</p>
        <div class="galeria">
        ${imagensHTML}
        </div>
    `;

    lista.appendChild(local);

    document.getElementById("nome").value = "";
    document.querySelectorAll('input[name="modalidade"]:checked').forEach(checkbox => checkbox.checked = false);
    document.getElementById("endereco").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("acessibilidade").value = "";
    fotoInput.value = "";
    document.getElementById("msgFoto").style.display = "none";
    alert("Local cadastrado com sucesso!");
    esporte.length === 0 && alert("Selecione pelo menos uma modalidade esportiva para o local.");
};

</script>

</body>
</html>
