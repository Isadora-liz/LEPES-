<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Espaços</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background:
        linear-gradient(
            rgba(0, 0, 0, 0.5),
            rgba(0, 0, 0, 0.5)
        ),
        url('https://img.olympics.com/images/image/private/t_s_16_9_g_auto/t_s_w2440/f_auto/primary/tihomsolxa4uqxwvermu');

    background-size: cover;
}

.titulo {
    width: 70%;
    margin: 25px auto 0;
    font-size: 32px;
    color: white;
}

.linha {
    width: 70%;
    margin: 3px auto 20px;
    border-bottom: 1px solid #ddd;
}

#campo-busca{
    width:70%;
    margin:10px auto;
    display:block;
    padding:10px;
    border-radius:10px;
}

#filtros-modalidades {
    gap: 8px;
    flex-wrap: wrap;
    width:70%;
    margin:10px auto;
    display:block;
    padding:10px;
}

.bot-modalidade {
    padding: 6px 12px;
    border: 1px solid #ccc;
    background: #f4f4f4;
    border-radius: 6px;
    cursor: pointer;
}

.bot-modalidade.ativo {
    background: #0055ff;
    color: white;
    border-color: #0033aa;
}

.lugar-card {
    background: white;
    width: 70%;
    margin: 15px auto;
    padding: 15px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    color: black;
    position: relative;
}

.lugar-img {
    width: 130px;
    height: 120px;
    background: #e3a878;
    border-radius: 10px;
    margin-right: 15px;
}

.info {
    flex: 1;
}

.titulo-local {
    font-size: 22px;
    margin: 0;
}

.endereco {
    margin: 0;
    font-size: 15px;
    color: #333;
}

.estrelas {
    margin-top: 5px;
    cursor: pointer;
}

.estrela {
    font-size: 22px;
    color: #ff7b22;
    transition: 0.2s;
}

.estrela:hover {
    transform: scale(1.2);
}

.botao-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 15px 0;
    font-size: 18px;
}

.botao-menu a {
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.botao-menu a:hover {
    color: #1877f2 !important; 
}

.botao-menu a.active {
    color: #1877f2 !important;
}

#icone-mapa {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 14px;
}

#icone-mapa::before {
    content: 'map'; 
    font-family: 'Material Icons';
    font-size: 25px;
    margin-bottom: 4px;
}

#icone-explorar {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #ffffff;
  font-family: Arial, sans-serif;
  font-size: 14px;
}

#icone-explorar::before {
  content: 'explore'; 
  font-family: 'Material Icons';
  font-size: 25px; 
  margin-bottom: 4px;
}

#icone-usuario {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 14px;
}

#icone-usuario::before {
  content: 'person'; 
  font-family: 'Material Icons';
  font-size: 25px; 
  margin-bottom: 4px;
}


</style>
</head>
<body>

<div class="titulo">Espaços</div>
<div class="linha"></div>

<input id="campo-busca" type="text" placeholder="Buscar..." >
<div id="filtros-modalidades">
    <button class="bot-modalidade" data-id="1">Vôlei</button>
    <button class="bot-modalidade" data-id="2">Futebol</button>
    <button class="bot-modalidade" data-id="3">Tênis de Mesa</button>
    <button class="bot-modalidade" data-id="4">Basquete</button>
    <button class="bot-modalidade" data-id="5">Skate</button>
    <button class="bot-modalidade" data-id="6">Bocha</button>
    <button class="bot-modalidade" data-id="7">Tênis de Praia</button>
    <button class="bot-modalidade" data-id="8">Futevôlei</button>
    <button class="bot-modalidade" data-id="9">Tênis</button>
    <button class="bot-modalidade" data-id="10">Vôlei de Praia</button>
</div>

<div id="lista-lugares"></div>

<div class="botao-menu">
    <a href="explorar.html" class="active" id="icone-explorar">Explorar</a>
    <a href="mapa.html" class="" id="icone-mapa">Mapa</a>
    <a id="icone-usuario" href="perfil.html">Perfil</a>
</div>

<script type="module" src="./explorar.js"></script>

</body>
</html>
