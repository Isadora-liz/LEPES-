<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar Local Esportivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    padding:40px 20px;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
}

.topo{
    text-align:center;
    margin-top:20px;
    margin-bottom:35px;
}

.topo h1{
    font-size:42px;
    font-weight:700;
    margin-bottom:10px;
}

.topo p{
    color:#94a3b8;
    font-size:16px;
}

.card{
    width: 1000px;
    padding: 25px;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.card-header{
    padding:30px;
    border-bottom:1px solid #1f2937;
}

.card-header h2{
    margin-bottom:8px;
}

.card-header p{
    color:#94a3b8;
}

.form{
    padding:30px;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
}

.modalidades-grid,
.acessibilidade-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.modalidades-grid input,
.acessibilidade-grid input{
    display:none;
}

.modalidade-card,
.acessibilidade-card{
    background:#1e293b;
    border:2px solid #334155;
    border-radius:18px;
    height:70px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#cbd5e1;
    font-size:15px;
    font-weight:500;

    cursor:pointer;
    user-select:none;
    transition:.15s;
}

.modalidade-card:hover,
.acessibilidade-card:hover{
    border-color:#3b82f6;
    transform:translateY(-2px);
}

.modalidades-grid input:checked + .modalidade-card,
.acessibilidade-grid input:checked + .acessibilidade-card{
    background:#2563eb;
    border-color:#60a5fa;
    color:white;

    box-shadow:
        0 0 0 3px rgba(96,165,250,.4),
        0 0 20px rgba(37,99,235,.6);

    font-weight:600;
}

input[type="text"],
textarea,
select{
    width:100%;
    background:#1e293b;
    border:1px solid #334155;
    border-radius:14px;
    padding:15px;
    color:white;
    transition:0.3s;
}

input[type="text"]::placeholder,
textarea::placeholder{
    color:#64748b;
}

input[type="text"]:focus,
textarea:focus,
select:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

.acessibilidade{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}


.item{
    background:#1e293b;
    border:1px solid #334155;
    padding:12px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.item input{
    width:18px;
    height:18px;
}

.upload{
    border:2px dashed #334155;
    border-radius:16px;
    padding:35px;
    text-align:center;
    background:#1e293b;
    cursor:pointer;
    transition:0.3s;
}

.upload:hover{
    border-color:#3b82f6;
}

.upload p{
    color:#94a3b8;
    margin-top:8px;
}

.upload input{
    display:none;
}

.mensagem-upload{
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    background:#14532d;
    border:1px solid #22c55e;
    color:#dcfce7;
    display:none;
    font-size:14px;
    font-weight:500;
}

.btn{
    width:100%;
    margin-top:10px;
    border:none;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    padding:16px;
    font-size:16px;
    font-weight:600;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,.3);
}

.mensagem-sucesso{
    display:none;
    position:sticky;
    top:20px;

    background:#14532d;
    border:1px solid #22c55e;
    color:#dcfce7;

    padding:15px;
    border-radius:12px;
    margin-bottom:20px;

    text-align:center;
    font-weight:600;
}

.linha-dupla{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

@media(max-width:768px){
    .linha-dupla{
        grid-template-columns:1fr;
    }
}

input[type="date"],
input[type="time"]{
    width:100%;

    background:#1e293b;
    border:1px solid #334155;

    color:white;

    padding:14px;
    border-radius:12px;

    margin-bottom:20px;

    transition:.2s;
}

input[type="date"]:focus,
input[type="time"]:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

</style>
</head>
<body>

<div class="container">

<div id="mensagem-sucesso" class="mensagem-sucesso">
</div>
    <div class="card">

        <div class="card-header">
            <h1>Adicionar evento esportivo</h1>
            <p>Preencha os dados abaixo, todos os campos são obrigatórios.</p>
        </div>

        <form class="form-local">

            <div class="form-group">
                <label>Nome do evento</label>
                <input type="text" placeholder="Ex: Campeonato Regional de Futebol">
            </div>

            <div class="form-group">
                <label>Endereço completo</label>
                <input type="text" placeholder="Ex: Rua das Flores, 123 - Centro">
            </div>

        <div class="linha-dupla">

    <div>
        <label>Data do Evento</label>
        <input type="date">
    </div>

    <div>
        <label>Horário</label>
        <input type="time">
    </div>

</div>

            <div class="form-group">
<div class="form-group">
    <label>Modalidade(s) do evento</label>
    <div class="modalidades-grid">

          <input type="checkbox" id="futebol" name="modalidades[]">
          <label for="futebol" class="modalidade-card">
            Futsal
          </label>

          <input type="checkbox" id="volei" name="modalidades[]">
          <label for="volei" class="modalidade-card">
            Vôlei de praia
          </label>

          <input type="checkbox" id="basquete" name="modalidades[]">
          <label for="basquete" class="modalidade-card">
            Basquete
          </label>

          <input type="checkbox" id="handebol" name="modalidades[]">
          <label for="handebol" class="modalidade-card">
            Bocha
          </label>

          <input type="checkbox" id="futsal" name="modalidades[]">
          <label for="futsal" class="modalidade-card">
            Voleibol
          </label>

          <input type="checkbox" id="tenis" name="modalidades[]">
          <label for="tenis" class="modalidade-card">
            Tênis de mesa
          </label>

          <input type="checkbox" id="natação" name="modalidades[]">
          <label for="natação" class="modalidade-card">
              Natação
          </label>

          <input type="checkbox" id="artes marciais" name="modalidades[]">
          <label for="artes marciais" class="modalidade-card">
               Artes Marciais
          </label>

          <input type="checkbox" id="futebol de campo" name="modalidades[]">
          <label for="futebol de campo" class="modalidade-card">
                Futebol de Campo
          </label>

          <input type="checkbox" id="atletismo infantil" name="modalidades[]">
          <label for="atletismo infantil" class="modalidade-card">
                  Atletismo Infantil
          </label>

          <input type="checkbox" id="skateboarding" name="modalidades[]">
          <label for="skateboarding" class="modalidade-card">
                   Skateboarding
          </label>
          <input type="checkbox" id="futebol de areia" name="modalidades[]">
          <label for="futebol de areia" class="modalidade-card">
                   Futebol de Areia
          </label>
          <input type="checkbox" id="beach tennis" name="modalidades[]">
          <label for="beach tennis" class="modalidade-card">
                   Beach Tennis
          </label>
          <input type="checkbox" id="futevôlei" name="modalidades[]">
          <label for="futevôlei" class="modalidade-card">
                   Futevôlei
          </label>
          <input type="checkbox" id="futemesa" name="modalidades[]">
          <label for="futemesa" class="modalidade-card">
                   Futebol de Mesa
          </label>
</div>

    <div class="form-group">
                <label>Descrição</label>
                <textarea placeholder="Descreva brevemente o evento esportivo..."></textarea>
            </div>

    <label>Acessibilidade
    </label>

        <div class="acessibilidade-grid">

            <input type="checkbox" id="rampa" name="acessibilidade[]">
            <label for="rampa" class="acessibilidade-card">
                Rampa de Acesso
            </label>

            <input type="checkbox" id="banheiro" name="acessibilidade[]">
            <label for="banheiro" class="acessibilidade-card">
                Banheiro Adaptado
            </label>

            <input type="checkbox" id="Suporte" name="acessibilidade[]">
            <label for="Suporte" class="acessibilidade-card">
                Suporte para Cadeirante
            </label>

            <input type="checkbox" id="vagas" name="acessibilidade[]">
            <label for="vagas" class="acessibilidade-card">
                Vagas Reservadas
            </label>
            <input type="checkbox" id="piso" name="acessibilidade[]">
            <label for="piso" class="acessibilidade-card">
                Piso Tátil
            </label>
              </div>

           <label class="upload">
         📷
         <h3>Selecionar Imagens do evento esportivo</h3>
         <p>Arraste arquivos ou clique para enviar</p>

     <input
        type="file"
        id="imagens"
        multiple
        accept="image/*"
    >
</label>
<div id="mensagem-imagem" class="mensagem-sucesso">
</div>

    </div>
    <button
    class="btn"
    type="button"
    onclick="
        document.getElementById('mensagem-sucesso').innerHTML='✅ Evento adicionado com sucesso!';
        document.getElementById('mensagem-sucesso').style.display='block';
        window.scrollTo({top:0,behavior:'smooth'});
    ">
    Cadastrar Evento
        </button>
        <body>
        <script>
    document.getElementById("imagens").addEventListener("change", function() {

    const quantidade = this.files.length;
    const mensagem = document.getElementById("mensagem-imagem");

    mensagem.style.display = "block";

    if (quantidade === 1) {
        mensagem.innerHTML = "✅ 1 imagem adicionada com sucesso!";
    } else {
        mensagem.innerHTML = `✅ ${quantidade} imagens adicionadas com sucesso!`;
    }

});
</script>
</html>
