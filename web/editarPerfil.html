<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Perfil</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#111827;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}

.avatar-preview{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 25px;
    box-shadow:0 0 25px rgba(0, 0, 0, 0.74);
}

label{
    display:block;
    color:#e2e8f0;
    margin-bottom:8px;
    font-weight:600;
}

input[type="text"],
input[type="file"]{
    width:100%;
    background:#1e293b;
    border:1px solid #334155;
    color:white;

    padding:14px;
    border-radius:12px;
    margin-bottom:20px;

    transition:.2s;
}

input[type="text"]:focus,
input[type="file"]:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

input[type="file"]{
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:12px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:.2s;
}

.upload-avatar{
    display:block;

    background:#1e293b;
    border:2px dashed #334155;
    border-radius:16px;

    padding:25px;
    margin-bottom:15px;

    text-align:center;
    cursor:pointer;

    transition:.2s;
}

.upload-avatar:hover{
    border-color:#3b82f6;
}

.upload-avatar h3{
    color:white;
    margin-bottom:6px;
}

.upload-avatar p{
    color:#94a3b8;
    font-size:14px;
}

.msg-avatar{
    display:none;

    background:#14532d;
    border:1px solid #22c55e;
    color:#dcfce7;

    padding:12px;
    border-radius:12px;
    margin-bottom:20px;

    text-align:center;
    font-weight:500;
}

</style>
</head>
<body>

<div class="container">
    <h2>Editar Perfil</h2>
    <img id="avatar-preview" class="avatar-preview" src="default-avatar.png" alt="Avatar">
    <form id="editar-perfil-form">
        <label>Nome:</label>
        <input type="text" id="nome" name="nome" required>
        
        <label>Avatar:</label>
        <input type="file" id="avatar" name="avatar" accept="image/*">
        
        <button type="submit">Atualizar Perfil</button>
    </form>
</div>

<script>

fetch('perfil.php')
.then(res => res.json())
.then(usuario => {
    if(!usuario.erro){
        document.getElementById('nome').value = usuario.nome;
        if(usuario.avatar){
            document.getElementById('avatar-preview').src = usuario.avatar;
        }
    }
})
.catch(err => console.error(err));

document.getElementById('avatar').addEventListener('change', function(){
    const file = this.files[0];
    if(file){
        document.getElementById('avatar-preview').src = URL.createObjectURL(file);
    }
});

document.getElementById('editar-perfil-form').addEventListener('submit', function(e){
    e.preventDefault();
    const formData = new FormData();
    formData.append('nome', document.getElementById('nome').value);
    const file = document.getElementById('avatar').files[0];
    if(file) formData.append('avatar', file);

    fetch('editarPerfil.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.ok){
            alert("Perfil atualizado com sucesso!");
            window.location.href = 'perfil.html'; 
        } else {
            alert("Erro: " + (data.erro || "Não foi possível atualizar."));
        }
    })
    .catch(err => console.error(err));
});
</script>

</body>
</html>
